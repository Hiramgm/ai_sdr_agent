services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./reports:/app/reports
    depends_on:
      redis:
        condition: service_healthy

  worker:
    build: .
    command: ["python", "-m", "ai_sdr.jobs.worker", "--simple"]
    env_file:
      - .env
    environment:
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./reports:/app/reports
    depends_on:
      redis:
        condition: service_healthy
